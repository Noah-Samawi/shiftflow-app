<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShiftManager – Offline</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0F172A;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .card {
      background: #1E293B;
      border-radius: 16px;
      padding: 48px 32px;
      text-align: center;
      max-width: 400px;
      width: 100%;
    }
    .icon {
      font-size: 48px;
      margin-bottom: 16px;
    }
    h1 { font-size: 1.5rem; margin-bottom: 8px; }
    p { color: #94a3b8; font-size: 0.9375rem; line-height: 1.5; margin-bottom: 24px; }
    button {
      background: #3B82F6;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 24px;
      font-size: 0.9375rem;
      font-weight: 500;
      cursor: pointer;
    }
    button:hover { background: #2563EB; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>Du bist offline</h1>
    <p>Keine Internetverbindung verfügbar. Überprüfe deine Verbindung und versuche es erneut.</p>
    <button onclick="window.location.reload()">Erneut versuchen</button>
  </div>
</body>
</html>
